<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator-App</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./calculator.js" defer></script>
</head>
<body>
    <div id="calculator-container">
        <input id="screen" maxlength="1">
        <div id="buttons-container">
            <div id="main-buttons">
                <button class="operator arit">&times</button>
                <button class="operator arit">&divide</button>
                <button id="clear-all" class="operator clear">C</button>
                <button class="digit">9</button>
                <button class="digit">8</button>
                <button class="digit">7</button>
                <button class="digit">6</button>
                <button class="digit">5</button>
                <button class="digit">4</button>
                <button class="digit">3</button>
                <button class="digit">2</button>
                <button class="digit">1</button>
                <button id="decimal" class="digit">.</button>
                <button class="digit">0</button>
                <button class="operator"></button>
            </div>
            <div id="side-buttons">
                <button id="backspace" class="operator clear">⌫</button>
                <button class="operator arit">+</button>
                <button class="operator arit">-</button>
                <button id="equals-to" class="operator bigger">=</button>
            </div>
        </div>
        <div id="autors-credit">powered by &#169;topSimpa<br>TheOdinProject</div>
    </div>
</body>
</html>
